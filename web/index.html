<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server Status Monitor</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>Minecraft Server Monitor</h1>
    <p class="subtitle">Paper /status エンドポイントを5秒ごとに監視します</p>

    <section class="status-card">
      <div class="row">
        <span class="label">状態</span>
        <span id="onlineBadge" class="badge offline">オフライン</span>
      </div>
      <div class="row"><span class="label">サーバー名</span><span id="serverName">-</span></div>
      <div class="row"><span class="label">プレイヤー</span><span id="players">- / -</span></div>
      <div class="row"><span class="label">TPS</span><span id="tps">-</span></div>
      <div class="row"><span class="label">バージョン</span><span id="version">-</span></div>
      <div class="row"><span class="label">最終確認</span><span id="lastChecked">-</span></div>
      <div class="row"><span class="label">監視URL</span><span id="statusUrl">-</span></div>
    </section>

    <p id="message" class="message">監視を開始しています...</p>
  </main>

  <script src="./config.js"></script>
  <script src="./script.js"></script>
</body>
</html>
